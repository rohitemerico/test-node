<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyKAD API Fetcher</title>

  <style>
    :root {
      --accent: #c4552d;
      --accent-strong: #8f3213;
      --border: rgba(31, 26, 23, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: linear-gradient(135deg, #efe4d1, #f7f3eb);
      padding: 24px;
      display: flex;
      justify-content: center;
    }

    main {
      width: min(1000px, 100%);
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .section {
      background: rgba(255, 251, 245, 0.9);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
    }

    .label {
      font-size: 13px;
      font-weight: bold;
      color: #5a4f45;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-family: inherit;
      /* margin-bottom: 12px; */
    }

    textarea {
      min-height: 180px;
      resize: vertical;
      background: #1a1a1a;
      color: #ddd;
      border: none;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: bold;
    }

    .primary {
      background: var(--accent);
      color: white;
    }

    .secondary {
      background: rgba(0, 0, 0, 0.08);
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
      align-items: center;
    }

    /* ================= GRID FOR INPUTS ================= */
    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 700px) {
      .input-grid {
        grid-template-columns: 1fr;
      }
    }

    .status {
      font-size: 13px;
    }
  </style>
</head>

<body>

  <main>

    <section class="section">

      <h2>MyKAD API Fetcher</h2>

      <!-- ================= INPUT GRID ================= -->
      <div class="input-grid">

        <div>
          <div class="label">Host / IP</div>
          <input id="api-host" value="192.168.1.28" />
        </div>

        <div>
          <div class="label">Port</div>
          <input id="api-port" value="8080" />
        </div>

        <div>
          <div class="label">Request ID</div>
          <input id="api-requestId" value="REQ-2001" />
        </div>

        <div>
          <div class="label">API Key</div>
          <input id="api-key" value="test-key" />
        </div>

        <div style="grid-column: 1 / -1;">
          <div class="label">Encryption Key</div>
          <input id="api-encKey" value="client-encryption-key-123" />
        </div>

      </div>

      <!-- BUTTON -->
      <div class="row">
        <button class="primary" id="send-api">Send Request</button>
        <span id="api-status" class="status"></span>
      </div>

      <!-- ================= API RESPONSE ================= -->
      <div class="row">
        <textarea id="api-result" placeholder="Waiting for request..."></textarea>
      </div>
      <!-- DECRYPT -->
      <div class="row">
        <button class="primary" id="decrypt-btn">Decrypt</button>
      </div>

      <!-- ================= DECRYPTED OUTPUT ================= -->
      <div class="row">
        <textarea id="decrypt-result" placeholder="Decrypted output will appear here..."></textarea>
      </div>
      <!-- COPY + CLEAR -->
      <div class="row">
        <button class="secondary" id="copy-btn">Copy</button>
        <button class="secondary" id="clear-btn">Clear</button>
      </div>

    </section>

  </main>

  <script>
    const statusEl = document.getElementById("api-status");

    const encoder = new TextEncoder();
    const decoder = new TextDecoder();

    function bytesToBase64(bytes) {
      let binary = "";
      bytes.forEach((byte) => {
        binary += String.fromCharCode(byte);
      });
      return btoa(binary);
    }

    function base64ToBytes(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) {
        bytes[i] = binary.charCodeAt(i);
      }
      return bytes;
    }

    async function deriveKeyAndIv(secret) {
      const secretHash = await crypto.subtle.digest(
        "SHA-256",
        encoder.encode(secret)
      );
      const keyBytes = new Uint8Array(secretHash);
      const iv = keyBytes.slice(0, 16);
      const key = await crypto.subtle.importKey(
        "raw",
        keyBytes,
        { name: "AES-CBC" },
        false,
        ["encrypt", "decrypt"]
      );

      return { key, iv };
    }

    document.getElementById("send-api").onclick = async () => {
      const host = document.getElementById("api-host").value;
      const port = document.getElementById("api-port").value;
      const requestId = document.getElementById("api-requestId").value;
      const key = document.getElementById("api-key").value;
      const encKey = document.getElementById("api-encKey").value;

      const url =
        `http://${host}:${port}/MyBioIDAPI/getVerifyCardInfoExt` +
        `?strRequestID=${encodeURIComponent(requestId)}` +
        `&strKey=${encodeURIComponent(key)}` +
        `&strEncKey=${encodeURIComponent(encKey)}`;

      try {
        statusEl.textContent = "⏳ Sending...";

        const res = await fetch(url);
        const text = await res.text();

        document.getElementById("api-result").value = text;

        statusEl.textContent = `✅ Success (${res.status})`;

      } catch (err) {
        document.getElementById("api-result").value = "ERROR: " + err.message;
        statusEl.textContent = "❌ Failed";
      }
    };

    document.getElementById("decrypt-btn").onclick = async () => {
      const secret = document.getElementById("api-encKey").value.trim();
      const input = document.getElementById("api-result").value.trim();

      if (!secret || !input) {
        document.getElementById("api-status").textContent =
          "Secret key and value are required.";
        return;
      }

      try {
        const ciphertext = base64ToBytes(input);
        const { key, iv } = await deriveKeyAndIv(secret);

        const plaintext = await crypto.subtle.decrypt(
          { name: "AES-CBC", iv },
          key,
          ciphertext
        );

        const decoded = new TextDecoder().decode(plaintext);

        document.getElementById("decrypt-result").value = decoded;
        document.getElementById("api-status").textContent = "✅ Decrypted";

      } catch (err) {
        document.getElementById("api-status").textContent =
          "❌ Unable to decrypt. Check key or Base64 data.";
      }
    };

    document.getElementById("copy-btn").onclick = () => {
      const text = document.getElementById("decrypt-result");
      text.select();
      document.execCommand("copy");
      statusEl.textContent = "📋 Copied!";
    };

    document.getElementById("clear-btn").onclick = () => {
      document.getElementById("decrypt-result").value = "";
      statusEl.textContent = "🧹 Cleared";
    };
  </script>

</body>

</html>
