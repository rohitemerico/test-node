<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BioID API Fetcher</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: #2a2a2a;
      --text: #e8e6e0;
      --muted: #666;
      --accent: #e8c547;
      --accent-dim: rgba(232,197,71,0.12);
      --green: #4ade80;
      --red: #f87171;
      --font-mono: 'JetBrains Mono', monospace;
      --font-display: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
    }

    .grid-bg {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .container {
      position: relative; z-index: 1;
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    header { margin-bottom: 40px; }

    .badge {
      display: inline-block;
      font-size: 11px; letter-spacing: 0.15em;
      color: var(--accent); border: 1px solid var(--accent);
      padding: 3px 10px; margin-bottom: 16px;
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(48px, 10vw, 80px);
      font-weight: 800; line-height: 0.95;
      letter-spacing: -2px; margin-bottom: 16px;
    }

    .accent { color: var(--accent); }

    .subtitle {
      font-size: 11px; letter-spacing: 0.2em;
      color: var(--muted); text-transform: uppercase;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 28px; margin-bottom: 20px;
    }

    .card-label {
      font-size: 10px; letter-spacing: 0.3em;
      color: var(--muted); margin-bottom: 24px;
    }

    .field { display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .field-sm { max-width: 120px; }

    .field-row { display: flex; gap: 16px; margin-bottom: 16px; }

    label {
      font-size: 10px; letter-spacing: 0.2em;
      color: var(--muted); display: flex; align-items: center; gap: 6px;
    }

    .ip-badge {
      font-size: 9px; letter-spacing: 0.15em; padding: 1px 6px;
    }
    .ip-badge.detecting { color: var(--accent); }
    .ip-badge.found     { color: var(--green); }
    .ip-badge.failed    { color: var(--red); }

    input {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono); font-size: 13px;
      padding: 10px 14px; outline: none;
      transition: border-color 0.15s; width: 100%;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: #444; }
    input.detecting { border-color: var(--accent); opacity: 0.6; animation: pulse 1.2s ease-in-out infinite; }

    @keyframes pulse { 0%,100%{opacity:.6} 50%{opacity:1} }

    .divider { height: 1px; background: var(--border); margin: 8px 0 20px; }

    .url-preview {
      display: flex; align-items: flex-start; gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      padding: 12px 14px; margin: 20px 0;
      font-size: 11px; word-break: break-all; color: var(--muted);
    }

    .url-label {
      font-size: 10px; letter-spacing: 0.1em;
      color: var(--accent); background: var(--accent-dim);
      padding: 2px 8px; white-space: nowrap; flex-shrink: 0; margin-top: 1px;
    }

    .btn {
      width: 100%; margin-top: 8px; padding: 14px 24px;
      background: var(--accent); color: #0a0a0a;
      border: none; font-family: var(--font-mono);
      font-size: 13px; font-weight: 700; letter-spacing: 0.15em;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 10px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .spinner {
      width: 12px; height: 12px;
      border: 2px solid rgba(0,0,0,0.3); border-top-color: #000;
      border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .result-card { animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

    .result-card.success { border-left: 3px solid var(--green); }
    .result-card.error   { border-left: 3px solid var(--red); }

    .result-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 20px;
    }
    .result-header .card-label { margin-bottom: 0; }

    .result-meta { display: flex; align-items: center; gap: 8px; }

    .meta-chip {
      font-size: 10px; letter-spacing: 0.1em;
      padding: 3px 10px; background: var(--surface2);
      border: 1px solid var(--border); color: var(--muted);
    }

    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-ok  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot-err { background: var(--red);   box-shadow: 0 0 6px var(--red); }

    .result-url {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 11px; color: var(--muted); word-break: break-all;
      margin-bottom: 16px; padding: 10px 14px;
      background: var(--surface2); border: 1px solid var(--border);
    }

    .result-json {
      background: var(--surface2); border: 1px solid var(--border);
      padding: 20px; font-size: 12px; line-height: 1.7;
      overflow-x: auto; white-space: pre-wrap; word-break: break-word;
      color: #c8c4bb; max-height: 480px; overflow-y: auto;
    }

    footer {
      display: flex; justify-content: space-between;
      font-size: 10px; letter-spacing: 0.15em;
      color: #333; margin-top: 48px; text-transform: uppercase;
    }

    #result-section { display: none; }

    @media (max-width: 500px) {
      .field-row { flex-direction: column; }
      .field-sm { max-width: 100%; }
      footer { flex-direction: column; gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="container">

    <header>
      <div class="badge">LOCAL</div>
      <h1><span class="accent">Bio</span>ID<br>API Fetcher</h1>
      <p class="subtitle">iPad Service · Card Verification · Network Inspector</p>
      <div id="client-ip-badge" class="badge" style="display:none">CLIENT IP: <span id="client-ip"></span></div>
    </header>

    <section class="card">
      <div class="card-label">— ENDPOINT CONFIG —</div>
      <form id="api-form">
        <div class="field-row">
          <div class="field">
            <label>
              HOST / IP ADDRESS
              <span id="ip-badge" class="ip-badge detecting">⟳ DETECTING…</span>
            </label>
            <input id="host" name="host" placeholder="Detecting IP…" required spellcheck="false" class="detecting" />
          </div>
          <div class="field field-sm">
            <label>PORT</label>
            <input id="port" name="port" value="8080" required />
          </div>
        </div>

        <div class="divider"></div>

        <div class="field-row">
          <div class="field">
            <label>REQUEST ID</label>
            <input id="requestId" value="REQ-2001" />
          </div>
          <div class="field">
            <label>API KEY</label>
            <input id="key" value="test-key" />
          </div>
        </div>

        <div class="field">
          <label>ENCRYPTION KEY</label>
          <input id="encKey" value="client-encryption-key-123" />
        </div>

        <div id="url-preview" class="url-preview" style="display:none">
          <span class="url-label">GET</span>
          <span id="url-text"></span>
        </div>

        <button type="submit" class="btn" id="submit-btn">▶ SEND REQUEST</button>
      </form>
    </section>

    <section class="card result-card" id="result-section">
      <div class="result-header">
        <div class="card-label" id="result-label">— RESPONSE —</div>
        <div class="result-meta">
          <span class="meta-chip" id="meta-time" style="display:none"></span>
          <span class="meta-chip" id="meta-status" style="display:none"></span>
          <span class="status-dot" id="status-dot"></span>
        </div>
      </div>
      <div class="result-url" id="result-url" style="display:none">
        <span class="url-label">GET</span>
        <span id="result-url-text"></span>
      </div>
      <pre class="result-json" id="result-json"></pre>
    </section>

    <footer>
      <span>MyBioIDAPI · getVerifyCardInfoExt</span>
      <span>Running Locally</span>
    </footer>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    // --- Auto-detect local IP on load ---
    fetch("/api/local-ip")
      .then((r) => r.json())
      .then(({ ip }) => {
        const badge = $("ip-badge");
        const input = $("host");
        if (ip) {
          input.value = ip;
          input.placeholder = ip;
          input.classList.remove("detecting");
          badge.textContent = "✓ AUTO-DETECTED";
          badge.className = "ip-badge found";
        } else {
          input.placeholder = "192.168.1.x";
          input.classList.remove("detecting");
          badge.textContent = "✗ NOT FOUND";
          badge.className = "ip-badge failed";
        }
        updateUrlPreview();
      })
    // --- Get client IP ---
    fetch("/api/client-ip")
      .then((r) => r.json())
      .then(({ ip }) => {
        if (ip) {
          $("client-ip").textContent = ip;
          $("client-ip-badge").style.display = "block";
        }
      }).catch(() => {
        $("host").classList.remove("detecting");
        $("ip-badge").textContent = "✗ NOT FOUND";
        $("ip-badge").className = "ip-badge failed";
      });

    // --- Live URL preview ---
    function buildUrl() {
      const host = $("host").value.trim();
      const port = $("port").value.trim();
      const requestId = $("requestId").value.trim();
      const key = $("key").value.trim();
      const encKey = $("encKey").value.trim();
      if (!host) return null;
      return `http://${host}:${port}/MyBioIDAPI/getVerifyCardInfoExt` +
        `?strRequestID=${encodeURIComponent(requestId)}` +
        `&strKey=${encodeURIComponent(key)}` +
        `&strEncKey=${encodeURIComponent(encKey)}`;
    }

    function updateUrlPreview() {
      const url = buildUrl();
      const preview = $("url-preview");
      if (url) {
        $("url-text").textContent = url;
        preview.style.display = "flex";
      } else {
        preview.style.display = "none";
      }
    }

    ["host","port","requestId","key","encKey"].forEach((id) => {
      $(id)?.addEventListener("input", updateUrlPreview);
    });

    // --- Form submit ---
    $("api-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = $("submit-btn");
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> CALLING API…';

      const t0 = Date.now();
      const body = {
        host: $("host").value.trim(),
        port: $("port").value.trim(),
        requestId: $("requestId").value.trim(),
        key: $("key").value.trim(),
        encKey: $("encKey").value.trim(),
      };

      try {
        const res = await fetch("/api/verify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        const elapsed = Date.now() - t0;
        showResult(data, elapsed);
      } catch (err) {
        showResult({ success: false, error: err.message }, Date.now() - t0);
      } finally {
        btn.disabled = false;
        btn.textContent = "▶ SEND REQUEST";
      }
    });

    function showResult(data, elapsed) {
      const section = $("result-section");
      section.style.display = "block";

      const ok = data.success;
      section.className = `card result-card ${ok ? "success" : "error"}`;
      $("result-label").textContent = ok ? "— RESPONSE —" : "— ERROR —";

      $("meta-time").textContent = `${elapsed}ms`;
      $("meta-time").style.display = "inline";

      if (data.status) {
        $("meta-status").textContent = `HTTP ${data.status}`;
        $("meta-status").style.display = "inline";
      } else {
        $("meta-status").style.display = "none";
      }

      $("status-dot").className = `status-dot ${ok ? "dot-ok" : "dot-err"}`;

      if (data.url) {
        $("result-url-text").textContent = data.url;
        $("result-url").style.display = "flex";
      } else {
        $("result-url").style.display = "none";
      }

      $("result-json").textContent = JSON.stringify(
        data.data ?? data.error ?? data, null, 2
      );

      section.scrollIntoView({ behavior: "smooth", block: "start" });
    }
  </script>
</body>
</html>
