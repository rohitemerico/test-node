<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyKAD API Fetcher</title>

  <style>
    :root {
      --accent: #c4552d;
      --border: rgba(31, 26, 23, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: linear-gradient(135deg, #efe4d1, #f7f3eb);
      padding: 24px;
      display: flex;
      justify-content: center;
    }

    main {
      width: min(1000px, 100%);
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .section {
      background: rgba(255, 251, 245, 0.9);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
    }

    .label {
      font-size: 13px;
      font-weight: bold;
      color: #5a4f45;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-family: inherit;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: #1a1a1a;
      color: #ddd;
      resize: vertical;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: bold;
    }

    .primary {
      background: var(--accent);
      color: white;
    }

    .secondary {
      background: rgba(0, 0, 0, 0.08);
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
      align-items: center;
    }

    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 700px) {
      .input-grid {
        grid-template-columns: 1fr;
      }
    }

    pre {
      background: #f4f1ea;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(31, 26, 23, 0.12);
      white-space: pre-wrap;
      word-break: break-word;
      font-family: monospace;
      min-height: 60px;
    }

    .status {
      font-size: 13px;
    }
  </style>
</head>

<body>

  <main>

    <section class="section">

      <h2>MyKAD API Fetcher</h2>

      <!-- INPUTS -->
      <div class="input-grid">

        <div>
          <div class="label">Host / IP</div>
          <input id="api-host" value="192.168.1.28">
        </div>

        <div>
          <div class="label">Port</div>
          <input id="api-port" value="8080">
        </div>

        <div>
          <div class="label">Request ID</div>
          <input id="api-requestId" value="REQ-2001">
        </div>

        <div>
          <div class="label">API Key</div>
          <input id="api-key" value="test-key">
        </div>

        <div style="grid-column: 1 / -1;">
          <div class="label">Encryption Key</div>
          <input id="api-encKey" value="client-encryption-key-123">
        </div>

      </div>

      <!-- ENDPOINT -->
      <pre id="api-endpoint"></pre>

      <!-- SEND -->
      <div class="row">
        <button class="primary" id="send-api">Send Request</button>
        <span id="api-status" class="status"></span>
      </div>

      <!-- API RESPONSE -->
      <div class="row">
        <textarea id="api-result" placeholder="API response will appear here..."></textarea>
      </div>

      <!-- DECRYPT -->
      <div class="row">
        <button class="primary" id="decrypt-btn">Decrypt</button>
      </div>

      <!-- DECRYPT RESULT -->
      <div class="row">
        <textarea id="decrypt-result" placeholder="Decrypted result will appear here..."></textarea>
      </div>

      <!-- COPY / CLEAR -->
      <div class="row">
        <button class="secondary" id="copy-btn">Copy</button>
        <button class="secondary" id="clear-btn">Clear</button>
      </div>

    </section>

  </main>

  <script>

    const statusEl = document.getElementById("api-status");

    const encoder = new TextEncoder();
    const decoder = new TextDecoder();

    /* ================= BASE64 ================= */
    function base64ToBytes(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
      }
      return bytes;
    }

    /* ================= KEY DERIVATION ================= */
    async function deriveKeyAndIv(secret) {
      const hash = await crypto.subtle.digest(
        "SHA-256",
        encoder.encode(secret)
      );

      const keyBytes = new Uint8Array(hash);
      const iv = keyBytes.slice(0, 16);

      const key = await crypto.subtle.importKey(
        "raw",
        keyBytes,
        { name: "AES-CBC" },
        false,
        ["decrypt"]
      );

      return { key, iv };
    }

    /* ================= ENDPOINT ================= */
    function updateEndpoint() {
      const host = document.getElementById("api-host").value;
      const port = document.getElementById("api-port").value;
      const requestId = document.getElementById("api-requestId").value;
      const key = document.getElementById("api-key").value;
      const encKey = document.getElementById("api-encKey").value;

      const url =
        `http://${host}:${port}/MyBioIDAPI/getVerifyCardInfoExt` +
        `?strRequestID=${encodeURIComponent(requestId)}` +
        `&strKey=${encodeURIComponent(key)}` +
        `&strEncKey=${encodeURIComponent(encKey)}`;

      document.getElementById("api-endpoint").textContent = url;
    }

    /* live update */
    ["api-host", "api-port", "api-requestId", "api-key", "api-encKey"]
      .forEach(id => {
        document.getElementById(id).addEventListener("input", updateEndpoint);
      });

    updateEndpoint();

    /* ================= SEND API ================= */
    document.getElementById("send-api").onclick = async () => {
      const url = document.getElementById("api-endpoint").textContent;

      try {
        statusEl.textContent = "⏳ Sending...";

        const res = await fetch(url);
        const data = await res.json(); // parse JSON

        const value = data?.Result?.sVerifyCardInfoExt || "";

        document.getElementById("api-result").value = value;

        statusEl.textContent = `✅ Success (${res.status})`;

      } catch (err) {
        document.getElementById("api-result").value = "ERROR: " + err.message;
        statusEl.textContent = "❌ Failed";
      }
    };

    /* ================= DECRYPT ================= */
    document.getElementById("decrypt-btn").onclick = async () => {

      const secret = document.getElementById("api-encKey").value.trim();
      const input = document.getElementById("api-result").value.trim();

      if (!secret || !input) {
        statusEl.textContent = "Secret or data missing";
        return;
      }

      try {
        const ciphertext = base64ToBytes(input);
        const { key, iv } = await deriveKeyAndIv(secret);

        const decrypted = await crypto.subtle.decrypt(
          { name: "AES-CBC", iv },
          key,
          ciphertext
        );

        document.getElementById("decrypt-result").value =
          decoder.decode(decrypted);

        statusEl.textContent = "✅ Decrypted";

      } catch (err) {
        statusEl.textContent = "❌ Decryption failed";
      }
    };

    /* ================= COPY ================= */
    document.getElementById("copy-btn").onclick = async () => {
      const text = document.getElementById("decrypt-result").value;
      if (!text) {
        statusEl.textContent = "❌ Nothing to copy.";
        return;
      }

      try {
        await navigator.clipboard.writeText(text);
        statusEl.textContent = "📋 Copied to clipboard";
      } catch (err) {
        statusEl.textContent = "❌ Clipboard access failed";
      }
    };

    /* ================= CLEAR ================= */
    document.getElementById("clear-btn").onclick = () => {
      document.getElementById("decrypt-result").value = "";
      statusEl.textContent = "🧹 Cleared";
    };

  </script>

</body>

</html>
